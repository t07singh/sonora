version: '3.8'

services:
  sonora-ui:
    image: sonora-studio/ui:prod
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8501:8501"
    volumes:
      - sonora_data:/tmp/sonora
    env_file: .env
    environment:
      - SEPARATOR_URL=http://sonora-separator:8000/process
      - TRANSCRIBER_URL=http://sonora-transcriber:8001/transcribe
      - SYNTHESIZER_URL=http://sonora-synthesizer:8002/synthesize
      - BACKEND_URL=http://sonora-api:8000
      - SHARED_PATH=/tmp/sonora
      - SONORA_DATA_DIR=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    depends_on:
      redis-cache:
        condition: service_started
      sonora-api:
        condition: service_started
    networks:
      - sonora-network

  sonora-api:
    image: sonora-studio/api:prod
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"
    volumes:
      - sonora_data:/tmp/sonora
    env_file: .env
    environment:
      - SEPARATOR_URL=http://sonora-separator:8000/process
      - TRANSCRIBER_URL=http://sonora-transcriber:8001/transcribe
      - SYNTHESIZER_URL=http://sonora-synthesizer:8002/synthesize
      - SEGMENTER_URL=http://sonora-segmenter:8004
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_DATA_DIR=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    depends_on:
      redis-cache:
        condition: service_started
    networks:
      - sonora-network

  # --- Microservices (GPU Optimized) ---

  sonora-transcriber:
    image: sonora-studio/transcriber:prod
    build:
      context: .
      dockerfile: src/services/transcriber/Dockerfile
    restart: on-failure
    volumes:
      - sonora_data:/tmp/sonora
    env_file: .env
    environment:
      - WHISPER_MODEL=large-v3
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_DATA_DIR=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - sonora-network
    security_opt:
      - seccomp:unconfined

  sonora-separator:
    image: sonora-studio/separator:prod
    build:
      context: .
      dockerfile: src/services/separator/Dockerfile
    restart: on-failure
    volumes:
      - sonora_data:/tmp/sonora
    env_file: .env
    environment:
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_DATA_DIR=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - sonora-network

  sonora-synthesizer:
    image: sonora-studio/synthesizer:prod
    build:
      context: .
      dockerfile: src/services/synthesizer/Dockerfile
    restart: on-failure
    volumes:
      - sonora_data:/tmp/sonora
    env_file: .env
    environment:
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_DATA_DIR=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - sonora-network

  sonora-segmenter:
    image: sonora-studio/segmenter:prod
    build:
      context: .
      dockerfile: src/services/segmenter/Dockerfile
    restart: on-failure
    volumes:
      - sonora_data:/tmp/sonora
    env_file: .env
    environment:
      - SEGMENTER_PORT=8004
      - WHISPER_MODEL=large-v3
      - SEGMENTER_MODE=fast
      - ALIGNER_TYPE=qwen3
      - HF_TOKEN=${HF_TOKEN}
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_DATA_DIR=/tmp/sonora
      - SONORA_MODE=production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - sonora-network

  # --- Infrastructure ---

  redis-cache:
    image: "redis:alpine"
    command: redis-server --appendonly yes
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - sonora-network

volumes:
  sonora_data:
  redis_data:


networks:
  sonora-network:
    driver: bridge
