services:
  # ─────────────────────────────────────────────
  # SONORA STREAMLIT UI (Port 8501)
  # ─────────────────────────────────────────────
  sonora-ui:
    container_name: sonora-ui
    build:
      context: .
      dockerfile: Dockerfile.ui
    command: ["streamlit", "run", "unified_demo.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - sonora-shared:/tmp/sonora
    env_file:
      - .env
    environment:
      - SEPARATOR_URL=http://sonora-separator:8000/process
      - TRANSCRIBER_URL=http://sonora-transcriber:8001/transcribe
      - SYNTHESIZER_URL=http://sonora-synthesizer:8002/synthesize
      - BACKEND_URL=http://sonora-api:8000
      - SHARED_PATH=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    depends_on:
      - sonora-api
      - redis-cache
    networks:
      - sonora-network

  # ─────────────────────────────────────────────
  # SONORA BACKEND API (Port 8000)
  # ─────────────────────────────────────────────
  sonora-api:
    container_name: sonora-api
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "run_server.py"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sonora-shared:/tmp/sonora
    env_file:
      - .env
    environment:
      - SEPARATOR_URL=http://sonora-separator:8000/process
      - TRANSCRIBER_URL=http://sonora-transcriber:8001/transcribe
      - SYNTHESIZER_URL=http://sonora-synthesizer:8002/synthesize
      - SEGMENTER_URL=http://sonora-segmenter:8004
      - REDIS_URL=redis://redis-cache:6379/0
      - BACKEND_URL=http://sonora-api:8000
      - SHARED_PATH=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    depends_on:
      - redis-cache
      - sonora-segmenter
    networks:
      - sonora-network

  # ─────────────────────────────────────────────
  # SONORA TRANSCRIBER (Port 8001) — Whisper / Groq Cloud
  # ─────────────────────────────────────────────
  sonora-transcriber:
    container_name: sonora-transcriber
    build:
      context: .
      dockerfile: src/services/transcriber/Dockerfile
    command: ["python", "src/services/transcriber/main.py"]
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - sonora-shared:/tmp/sonora
    env_file:
      - .env
    environment:
      - WHISPER_MODEL=large-v3
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    depends_on:
      - redis-cache
    networks:
      - sonora-network

  # ─────────────────────────────────────────────
  # SONORA SEPARATOR (Port 8003) — Demucs / Cloud HF Spaces
  # ─────────────────────────────────────────────
  sonora-separator:
    container_name: sonora-separator
    build:
      context: .
      dockerfile: src/services/separator/Dockerfile
    command: ["python", "src/services/separator/main.py"]
    ports:
      - "8003:8000"
    volumes:
      - .:/app
      - sonora-shared:/tmp/sonora
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    depends_on:
      - redis-cache
    networks:
      - sonora-network

  # ─────────────────────────────────────────────
  # SONORA SYNTHESIZER (Port 8002) — Qwen3 / ElevenLabs Cloud
  # ─────────────────────────────────────────────
  sonora-synthesizer:
    container_name: sonora-synthesizer
    build:
      context: .
      dockerfile: src/services/synthesizer/Dockerfile
    command: ["python", "src/services/synthesizer/main.py"]
    ports:
      - "8002:8002"
    volumes:
      - .:/app
      - sonora-shared:/tmp/sonora
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_MODE=production
      - CLOUD_OFFLOAD=true
    depends_on:
      - redis-cache
    networks:
      - sonora-network

  # ─────────────────────────────────────────────
  # SONORA SEGMENTER (Port 8004) — Full Video Segmentation Pipeline
  # Demucs → Silero VAD → Whisper ASR → pyannote Diarization →
  # Qwen3-ForcedAligner / wav2vec2 (precise mode) → Cut Clips
  # ─────────────────────────────────────────────
  sonora-segmenter:
    container_name: sonora-segmenter
    build:
      context: .
      dockerfile: src/services/segmenter/Dockerfile
    ports:
      - "8004:8004"
    volumes:
      - .:/app
      - sonora-shared:/tmp/sonora
    env_file:
      - .env
    environment:
      - SEGMENTER_PORT=8004
      - WHISPER_MODEL=large-v3
      - SEGMENTER_MODE=fast
      - ALIGNER_TYPE=qwen3
      - HF_TOKEN=${HF_TOKEN}
      - REDIS_URL=redis://redis-cache:6379/0
      - SHARED_PATH=/tmp/sonora
      - SONORA_DATA_DIR=/tmp/sonora
      - SONORA_MODE=production
    depends_on:
      - redis-cache
    networks:
      - sonora-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ─────────────────────────────────────────────
  # REDIS CACHE (Internal)
  # ─────────────────────────────────────────────
  redis-cache:
    image: "redis:alpine"
    networks:
      - sonora-network

volumes:
  sonora-shared:
    driver: local

networks:
  sonora-network:
    driver: bridge
